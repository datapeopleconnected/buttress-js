name: Run E2E Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >
          --health-cmd "mongo --eval 'db.runCommand({ ping: 1 })'" \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 3
      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >
          --health-cmd "redis-cli ping" \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 3

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run E2E Tests
      env:
        NODE_ENV: test
        BUTTRESS_APP_TITLE: ButtressJS TEST
        BUTTRESS_APP_CODE: bjs
        BUTTRESS_APP_PATH: ${{ github.workspace }}
        BUTTRESS_APP_WORKERS: 1
      run: npm run test:e2e