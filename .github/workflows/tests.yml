name: Tests
description: Run Unit & E2E tests on MongoDB and Redis

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run Unit Tests
      run: npm run test:unit

  e2e-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run E2E Tests
      env:
        NODE_ENV: test
        BUTTRESS_APP_TITLE: ButtressJS TEST
        BUTTRESS_APP_CODE: bjs
        BUTTRESS_APP_PATH: ${{ github.workspace }}
        BUTTRESS_APP_WORKERS: 1
      run: npm run test:e2e