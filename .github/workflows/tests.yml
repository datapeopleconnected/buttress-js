name: Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run Unit Tests
      run: npm run test:unit

  e2e-tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:4
        ports:
          - 27018:27017
      redis:
        image: redis:latest
        ports:
          - 6380:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Run E2E Tests
      env:
        NODE_ENV: test
        SHOW_LOG: TRUE
        BUTTRESS_APP_TITLE: ButtressJS TEST
        BUTTRESS_APP_CODE: bjs
        BUTTRESS_APP_PATH: ${{ github.workspace }}
        BUTTRESS_APP_WORKERS: 0
        BUTTRESS_APP_PROTOCOL: http
        BUTTRESS_HOST_URL: localhost:8000
        BUTTRESS_DATASTORE_CONNECTION_STRING: mongodb://localhost:27018
        BUTTRESS_REDIS_PORT: 6380
        BUTTRESS_SOCK_URL: http://localhost:8010
      run: npm run test:e2e