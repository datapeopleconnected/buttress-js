name: Docker Publish

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches:
      - main
      - develop

jobs:
  docker-publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'develop')

    steps:
    - name: Checkout code at tested commit
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Compute Docker tags
      id: tags
      run: |
        VERSION=$(node -p "require('./package.json').version")
        if [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
          echo "tags=dpcltd/buttress:latest,dpcltd/buttress:${VERSION}" >> "$GITHUB_OUTPUT"
        else
          echo "tags=dpcltd/buttress:develop" >> "$GITHUB_OUTPUT"
        fi

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.tags.outputs.tags }}
